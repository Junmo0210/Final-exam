<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>기말과제 · 웹앱 모음</title>
<style>
  :root {
    --bg1: #2c3e7a; --bg2: #3b6ef6;
    --panel: #ffffff; --text: #1f2430; --muted: #6b7280;
    --accent: #3b6ef6; --border: #e2e5ea;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Segoe UI", "Malgun Gothic", system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    display: flex; align-items: center; justify-content: center;
    padding: 24px; color: var(--text);
  }
  .card {
    width: 100%; max-width: 720px;
    background: var(--panel); border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,.3);
    padding: 44px 48px; text-align: center;
  }
  h1 { font-size: 28px; font-weight: 800; }
  .sub { font-size: 15px; color: var(--muted); margin-top: 8px; }
  .apps { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 32px; }
  .app {
    display: block; text-decoration: none; color: inherit;
    background: #f4f6fb; border: 1px solid var(--border);
    border-radius: 16px; padding: 28px 20px;
    transition: transform .12s, box-shadow .12s, border-color .12s;
  }
  .app:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 26px rgba(59,110,246,.2);
    border-color: var(--accent);
  }
  .app .ic { font-size: 42px; }
  .app .name { font-size: 17px; font-weight: 700; margin-top: 12px; }
  .app .desc { font-size: 13px; color: var(--muted); margin-top: 6px; line-height: 1.5; }
  .foot { font-size: 12px; color: var(--muted); margin-top: 28px; }
  @media (max-width: 560px) {
    .card { padding: 32px 24px; }
    .apps { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <main class="card">
    <h1>기말과제 · 웹앱 모음</h1>
    <p class="sub">아래에서 사용할 앱을 선택하세요.</p>

    <div class="apps">
      <a class="app" href="app1.html">
        <div class="ic">📄</div>
        <div class="name">앱1 · PDF 편집기</div>
        <div class="desc">여러 PDF에서 필요 없는 페이지를 지우고 순서를 바꿔 새 PDF로 저장</div>
      </a>

      <a class="app" href="app2.html">
        <div class="ic">🖼️</div>
        <div class="name">앱2 · 이미지 자르기</div>
        <div class="desc">JPG·PNG 이미지를 원하는 비율로 잘라 새 이미지로 저장</div>
      </a>
    </div>

    <p class="foot">© 2026 기말과제</p>
  </main>
</body>
</html>
