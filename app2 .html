<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>이미지 자르기 (크롭)</title>
<style>
  :root {
    --bg: #f4f5f7;
    --panel: #ffffff;
    --border: #e2e5ea;
    --text: #1f2430;
    --muted: #6b7280;
    --accent: #3b6ef6;
    --accent-dark: #2c55c4;
    --danger: #e5484d;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.05);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", "Malgun Gothic", system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 18px 24px;
  }
  header h1 { margin: 0; font-size: 20px; font-weight: 700; }
  header p { margin: 4px 0 0; font-size: 13px; color: var(--muted); }

  .wrap { max-width: 1000px; margin: 0 auto; padding: 24px; }

  /* 업로드 영역 */
  .dropzone {
    border: 2px dashed #c3c9d4;
    border-radius: 14px;
    background: var(--panel);
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .dropzone:hover { border-color: var(--accent); background: #fafbff; }
  .dropzone.drag { border-color: var(--accent); background: #eef3ff; }
  .dropzone .icon { font-size: 40px; }
  .dropzone .main { font-size: 16px; font-weight: 600; margin-top: 8px; }
  .dropzone .sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

  button {
    font-family: inherit; font-size: 14px; font-weight: 600;
    border: 1px solid var(--border); background: var(--panel); color: var(--text);
    padding: 9px 16px; border-radius: 9px; cursor: pointer;
    transition: background .15s, border-color .15s, opacity .15s;
  }
  button:hover { background: #f0f2f6; }
  button:disabled { opacity: .45; cursor: not-allowed; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.primary:hover { background: var(--accent-dark); }
  button.ghost-danger { color: var(--danger); border-color: #f1c7c8; }
  button.ghost-danger:hover { background: #fdf0f0; }

  /* 비율 선택 */
  .ratios {
    display: flex; flex-wrap: wrap; gap: 8px; margin: 18px 0 6px;
  }
  .ratios .chip {
    font-size: 13px; font-weight: 600;
    border: 1px solid var(--border); background: var(--panel); color: var(--text);
    padding: 7px 14px; border-radius: 999px; cursor: pointer;
    transition: all .15s;
  }
  .ratios .chip:hover { background: #f0f2f6; }
  .ratios .chip.active {
    background: var(--accent); border-color: var(--accent); color: #fff;
  }

  .label { font-size: 12.5px; color: var(--muted); margin: 16px 0 6px; font-weight: 600; }

  /* 편집 영역 */
  .stage-wrap {
    margin-top: 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    box-shadow: var(--shadow);
  }
  .stage {
    position: relative;
    margin: 0 auto;
    background:
      repeating-conic-gradient(#e9ecf1 0% 25%, #f7f8fa 0% 50%) 0 / 20px 20px;
    user-select: none;
    touch-action: none;
    line-height: 0;
  }
  .stage img { display: block; width: 100%; height: 100%; pointer-events: none; }

  /* 어두운 오버레이 + 크롭 박스 */
  .overlay {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  .crop-box {
    position: absolute;
    border: 1px solid rgba(255,255,255,.9);
    box-shadow: 0 0 0 9999px rgba(0,0,0,.45);
    cursor: move;
    touch-action: none;
  }
  /* 3분할 격자 */
  .crop-box::before, .crop-box::after {
    content: ""; position: absolute; background: rgba(255,255,255,.4);
  }
  .crop-box::before { left: 33.33%; right: 33.33%; top: 0; bottom: 0; border-left: 1px solid rgba(255,255,255,.4); border-right: 1px solid rgba(255,255,255,.4); background: none; }
  .crop-box::after { top: 33.33%; bottom: 33.33%; left: 0; right: 0; border-top: 1px solid rgba(255,255,255,.4); border-bottom: 1px solid rgba(255,255,255,.4); background: none; }

  .handle {
    position: absolute; width: 14px; height: 14px;
    background: #fff; border: 1px solid var(--accent);
    border-radius: 3px; z-index: 2;
  }
  .handle.nw { left: -7px;  top: -7px;    cursor: nwse-resize; }
  .handle.ne { right: -7px; top: -7px;    cursor: nesw-resize; }
  .handle.sw { left: -7px;  bottom: -7px; cursor: nesw-resize; }
  .handle.se { right: -7px; bottom: -7px; cursor: nwse-resize; }
  .handle.n  { left: 50%; top: -7px;    transform: translateX(-50%); cursor: ns-resize; }
  .handle.s  { left: 50%; bottom: -7px; transform: translateX(-50%); cursor: ns-resize; }
  .handle.w  { top: 50%; left: -7px;    transform: translateY(-50%); cursor: ew-resize; }
  .handle.e  { top: 50%; right: -7px;   transform: translateY(-50%); cursor: ew-resize; }

  /* 하단 정보 + 액션 */
  .bar {
    display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
    margin-top: 16px;
  }
  .bar .info { font-size: 13px; color: var(--muted); margin-right: auto; }
  .bar .info b { color: var(--text); }

  .format-pick { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); }
  .format-pick select {
    font-family: inherit; font-size: 13px; padding: 7px 10px;
    border: 1px solid var(--border); border-radius: 8px; background: var(--panel);
  }

  .status {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #1f2430; color: #fff; padding: 11px 20px; border-radius: 10px;
    font-size: 14px; box-shadow: var(--shadow); opacity: 0; pointer-events: none;
    transition: opacity .2s; max-width: 90%;
  }
  .status.show { opacity: 1; }
</style>
</head>
<body>
  <header>
    <h1>이미지 자르기 (크롭)</h1>
    <p>JPG·PNG 등 이미지를 불러와 원하는 비율로 자른 뒤 새 이미지로 저장하세요.</p>
  </header>

  <div class="wrap">
    <!-- 업로드 영역 -->
    <div class="dropzone" id="dropzone">
      <div class="icon">🖼️⬆️</div>
      <div class="main">이미지를 여기로 끌어다 놓거나 클릭해서 선택하세요</div>
      <div class="sub">JPG, PNG, WebP, GIF 등 지원 · 새 이미지를 불러오면 기존 작업은 교체됩니다</div>
      <input type="file" id="fileInput" accept="image/*" hidden />
    </div>

    <!-- 편집 패널 (이미지 로드 후 표시) -->
    <div id="editor" style="display:none">
      <div class="label">자르기 비율</div>
      <div class="ratios" id="ratios">
        <button class="chip active" data-ratio="free">자유</button>
        <button class="chip" data-ratio="1:1">1:1 (정사각형)</button>
        <button class="chip" data-ratio="4:3">4:3</button>
        <button class="chip" data-ratio="3:4">3:4</button>
        <button class="chip" data-ratio="16:9">16:9</button>
        <button class="chip" data-ratio="9:16">9:16</button>
        <button class="chip" data-ratio="3:2">3:2</button>
        <button class="chip" data-ratio="2:3">2:3</button>
      </div>

      <div class="stage-wrap">
        <div class="stage" id="stage">
          <img id="srcImg" alt="원본 이미지" />
          <div class="crop-box" id="cropBox">
            <span class="handle nw" data-dir="nw"></span>
            <span class="handle n"  data-dir="n"></span>
            <span class="handle ne" data-dir="ne"></span>
            <span class="handle e"  data-dir="e"></span>
            <span class="handle se" data-dir="se"></span>
            <span class="handle s"  data-dir="s"></span>
            <span class="handle sw" data-dir="sw"></span>
            <span class="handle w"  data-dir="w"></span>
          </div>
        </div>

        <div class="bar">
          <div class="info" id="info"></div>
          <div class="format-pick">
            저장 형식
            <select id="formatSel">
              <option value="image/png">PNG</option>
              <option value="image/jpeg">JPG</option>
              <option value="image/webp">WebP</option>
            </select>
          </div>
          <button id="newImgBtn">＋ 다른 이미지</button>
          <button id="resetCropBtn" class="ghost-danger">선택 영역 초기화</button>
          <button id="downloadBtn" class="primary">⬇️ 잘라서 다운로드</button>
        </div>
      </div>
    </div>
  </div>

  <div class="status" id="statusBox"></div>

<script>
  // ---- 상태 ----
  let img = new Image();        // 원본 이미지
  let natW = 0, natH = 0;       // 원본 픽셀 크기
  let dispW = 0, dispH = 0;     // 화면 표시 크기
  let aspect = null;            // 고정 비율 (null = 자유)
  let crop = { x: 0, y: 0, w: 0, h: 0 };  // 표시 좌표 기준 크롭 박스
  let originalName = "image";

  const MIN = 24;  // 최소 크롭 크기(px, 표시 기준)

  // ---- 요소 ----
  const dropzone = document.getElementById("dropzone");
  const fileInput = document.getElementById("fileInput");
  const editor = document.getElementById("editor");
  const stage = document.getElementById("stage");
  const srcImg = document.getElementById("srcImg");
  const cropBox = document.getElementById("cropBox");
  const info = document.getElementById("info");
  const statusBox = document.getElementById("statusBox");

  // ---- 토스트 ----
  let statusTimer;
  function showStatus(msg, ms = 2200) {
    statusBox.textContent = msg;
    statusBox.classList.add("show");
    clearTimeout(statusTimer);
    if (ms) statusTimer = setTimeout(() => statusBox.classList.remove("show"), ms);
  }

  // ---- 업로드 핸들링 ----
  dropzone.addEventListener("click", () => fileInput.click());
  document.getElementById("newImgBtn").addEventListener("click", () => fileInput.click());
  fileInput.addEventListener("change", (e) => { if (e.target.files[0]) loadFile(e.target.files[0]); fileInput.value = ""; });

  dropzone.addEventListener("dragover", (e) => { e.preventDefault(); dropzone.classList.add("drag"); });
  dropzone.addEventListener("dragleave", () => dropzone.classList.remove("drag"));
  dropzone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropzone.classList.remove("drag");
    const f = e.dataTransfer.files[0];
    if (f) loadFile(f);
  });

  function loadFile(file) {
    if (!file.type.startsWith("image/")) { showStatus("이미지 파일만 불러올 수 있습니다."); return; }
    originalName = file.name.replace(/\.[^.]+$/, "") || "image";
    const url = URL.createObjectURL(file);
    img = new Image();
    img.onload = () => {
      natW = img.naturalWidth;
      natH = img.naturalHeight;
      srcImg.src = url;
      editor.style.display = "block";
      // 레이아웃 반영 후 크기 측정
      requestAnimationFrame(() => { measureStage(); resetCrop(); });
    };
    img.onerror = () => showStatus("이미지를 불러오지 못했습니다.");
    img.src = url;
  }

  // 표시 영역 크기 측정 (반응형 대응)
  function measureStage() {
    // 가용 폭에 맞춰 stage 크기 결정 (원본보다 크게 키우지 않음)
    const avail = stage.parentElement.clientWidth - 32; // padding 보정
    const maxW = Math.min(avail, natW);
    dispW = maxW;
    dispH = maxW * (natH / natW);
    // 화면이 너무 길어지지 않도록 높이 제한
    const maxH = Math.min(window.innerHeight * 0.7, natH);
    if (dispH > maxH) {
      dispH = maxH;
      dispW = maxH * (natW / natH);
    }
    stage.style.width = dispW + "px";
    stage.style.height = dispH + "px";
  }

  // ---- 비율 선택 ----
  document.getElementById("ratios").addEventListener("click", (e) => {
    const chip = e.target.closest(".chip");
    if (!chip) return;
    document.querySelectorAll(".ratios .chip").forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    const r = chip.dataset.ratio;
    if (r === "free") { aspect = null; }
    else { const [a, b] = r.split(":").map(Number); aspect = a / b; }
    resetCrop();
  });

  // 현재 비율에 맞는 최대 크롭 박스를 중앙에 배치
  function resetCrop() {
    if (!dispW) return;
    let w, h;
    if (aspect === null) {
      w = dispW * 0.8; h = dispH * 0.8;
    } else {
      // 표시 영역 안에 들어가는 최대 크기
      w = dispW; h = w / aspect;
      if (h > dispH) { h = dispH; w = h * aspect; }
      w *= 0.9; h *= 0.9;
    }
    crop.w = w; crop.h = h;
    crop.x = (dispW - w) / 2;
    crop.y = (dispH - h) / 2;
    applyCrop();
  }

  document.getElementById("resetCropBtn").addEventListener("click", resetCrop);

  // 크롭 박스 화면 반영
  function applyCrop() {
    cropBox.style.left = crop.x + "px";
    cropBox.style.top = crop.y + "px";
    cropBox.style.width = crop.w + "px";
    cropBox.style.height = crop.h + "px";
    updateInfo();
  }

  function updateInfo() {
    const scale = natW / dispW;
    const realW = Math.round(crop.w * scale);
    const realH = Math.round(crop.h * scale);
    info.innerHTML = `원본 <b>${natW}×${natH}</b> · 결과 <b>${realW}×${realH}</b> px`;
  }

  // ---- 드래그(이동) & 리사이즈 ----
  let action = null;   // 'move' 또는 방향문자
  let start = null;    // { px, py, crop }

  function pointerPos(e) {
    const rect = stage.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }

  cropBox.addEventListener("pointerdown", (e) => {
    e.stopPropagation();
    const handle = e.target.closest(".handle");
    action = handle ? handle.dataset.dir : "move";
    start = { p: pointerPos(e), crop: { ...crop } };
    cropBox.setPointerCapture?.(e.pointerId);
    e.preventDefault();
  });

  window.addEventListener("pointermove", (e) => {
    if (!action) return;
    const p = pointerPos(e);
    const dx = p.x - start.p.x;
    const dy = p.y - start.p.y;
    if (action === "move") doMove(dx, dy);
    else doResize(action, dx, dy);
    applyCrop();
  });

  window.addEventListener("pointerup", () => { action = null; start = null; });

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  function doMove(dx, dy) {
    let nx = clamp(start.crop.x + dx, 0, dispW - start.crop.w);
    let ny = clamp(start.crop.y + dy, 0, dispH - start.crop.h);
    crop.x = nx; crop.y = ny;
  }

  function doResize(dir, dx, dy) {
    let { x, y, w, h } = start.crop;
    const right = x + w, bottom = y + h;

    if (aspect === null) {
      // 자유 비율: 각 변 독립 조절
      if (dir.includes("e")) w = clamp(start.crop.w + dx, MIN, dispW - x);
      if (dir.includes("s")) h = clamp(start.crop.h + dy, MIN, dispH - y);
      if (dir.includes("w")) {
        const nx = clamp(x + dx, 0, right - MIN);
        w = right - nx; x = nx;
      }
      if (dir.includes("n")) {
        const ny = clamp(y + dy, 0, bottom - MIN);
        h = bottom - ny; y = ny;
      }
    } else {
      // 고정 비율: 폭 변화량을 기준으로 높이를 계산, 앵커 코너 고정
      // 마우스가 끄는 주축(가로/세로)을 기준으로 새 폭 산정
      let newW;
      if (dir === "e" || dir === "w") {
        newW = dir === "e" ? start.crop.w + dx : start.crop.w - dx;
      } else if (dir === "n" || dir === "s") {
        const newH = dir === "s" ? start.crop.h + dy : start.crop.h - dy;
        newW = newH * aspect;
      } else {
        // 코너: 가로 변화량 우선
        const signX = dir.includes("e") ? 1 : -1;
        newW = start.crop.w + signX * dx;
      }
      newW = Math.max(MIN, newW);
      let newH = newW / aspect;

      // 앵커(반대편 모서리)를 기준으로 위치 결정
      const anchorRight  = dir.includes("w");  // 왼쪽을 움직이면 오른쪽 고정
      const anchorBottom = dir.includes("n");  // 위를 움직이면 아래쪽 고정

      let nx = anchorRight ? right - newW : x;
      let ny = anchorBottom ? bottom - newH : y;

      // 'e'/'w'(수평) 또는 's'/'n'(수직) 단일 핸들은 세로/가로 중심 유지
      if (dir === "e" || dir === "w") ny = y + (h - newH) / 2;
      if (dir === "n" || dir === "s") nx = x + (w - newW) / 2;

      // 경계 보정
      if (nx < 0) { nx = 0; }
      if (ny < 0) { ny = 0; }
      if (nx + newW > dispW) { newW = dispW - nx; newH = newW / aspect; }
      if (ny + newH > dispH) { newH = dispH - ny; newW = newH * aspect; }

      x = nx; y = ny; w = newW; h = newH;
    }
    crop = { x, y, w, h };
  }

  // 창 크기 변경 시 재배치
  let resizeT;
  window.addEventListener("resize", () => {
    if (editor.style.display === "none") return;
    clearTimeout(resizeT);
    resizeT = setTimeout(() => {
      const ratioX = crop.x / dispW, ratioY = crop.y / dispH;
      const ratioW = crop.w / dispW, ratioH = crop.h / dispH;
      measureStage();
      crop.x = ratioX * dispW; crop.y = ratioY * dispH;
      crop.w = ratioW * dispW; crop.h = ratioH * dispH;
      applyCrop();
    }, 120);
  });

  // ---- 잘라서 다운로드 ----
  document.getElementById("downloadBtn").addEventListener("click", () => {
    if (!natW) return;
    const scale = natW / dispW;  // 표시 → 원본 좌표 변환
    const sx = Math.round(crop.x * scale);
    const sy = Math.round(crop.y * scale);
    const sw = Math.round(crop.w * scale);
    const sh = Math.round(crop.h * scale);
    if (sw < 1 || sh < 1) { showStatus("자를 영역이 너무 작습니다."); return; }

    const canvas = document.createElement("canvas");
    canvas.width = sw;
    canvas.height = sh;
    const ctx = canvas.getContext("2d");

    const format = document.getElementById("formatSel").value;
    // JPG는 투명 배경을 흰색으로 채움
    if (format === "image/jpeg") {
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, sw, sh);
    }
    ctx.drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);

    const ext = format === "image/jpeg" ? "jpg" : format === "image/webp" ? "webp" : "png";
    const quality = format === "image/png" ? undefined : 0.92;

    canvas.toBlob((blob) => {
      if (!blob) { showStatus("이미지 생성에 실패했습니다."); return; }
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${originalName}_cropped.${ext}`;
      a.click();
      URL.revokeObjectURL(url);
      showStatus(`완료! ${sw}×${sh} 이미지를 저장했습니다.`);
    }, format, quality);
  });
</script>
</body>
</html>
