<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PDF 페이지 편집기</title>

<!-- 미리보기 렌더링용 (pdf.js) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<!-- 새 PDF 생성용 (pdf-lib) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<style>
  :root {
    --bg: #f4f5f7;
    --panel: #ffffff;
    --border: #e2e5ea;
    --text: #1f2430;
    --muted: #6b7280;
    --accent: #3b6ef6;
    --accent-dark: #2c55c4;
    --danger: #e5484d;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.05);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", "Malgun Gothic", system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 18px 24px;
  }
  header h1 { margin: 0; font-size: 20px; font-weight: 700; }
  header p { margin: 4px 0 0; font-size: 13px; color: var(--muted); }

  .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }

  /* 업로드 영역 */
  .dropzone {
    border: 2px dashed #c3c9d4;
    border-radius: 14px;
    background: var(--panel);
    padding: 40px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .dropzone:hover { border-color: var(--accent); background: #fafbff; }
  .dropzone.drag { border-color: var(--accent); background: #eef3ff; }
  .dropzone .icon { font-size: 40px; }
  .dropzone .main { font-size: 16px; font-weight: 600; margin-top: 8px; }
  .dropzone .sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

  /* 툴바 */
  .toolbar {
    display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
    margin: 22px 0 16px;
  }
  .toolbar .count { font-size: 14px; color: var(--muted); margin-right: auto; }
  button {
    font-family: inherit; font-size: 14px; font-weight: 600;
    border: 1px solid var(--border); background: var(--panel); color: var(--text);
    padding: 9px 16px; border-radius: 9px; cursor: pointer;
    transition: background .15s, border-color .15s, opacity .15s;
  }
  button:hover { background: #f0f2f6; }
  button:disabled { opacity: .45; cursor: not-allowed; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.primary:hover { background: var(--accent-dark); }
  button.ghost-danger { color: var(--danger); border-color: #f1c7c8; }
  button.ghost-danger:hover { background: #fdf0f0; }

  .hint {
    font-size: 12.5px; color: var(--muted); margin: 0 0 16px;
    display: flex; align-items: center; gap: 6px;
  }

  /* 페이지 그리드 */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 16px;
  }
  .card {
    position: relative;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow);
    cursor: grab;
    transition: transform .12s, box-shadow .12s, opacity .15s;
  }
  .card:active { cursor: grabbing; }
  .card.dragging { opacity: .4; }
  .card.over { outline: 2px solid var(--accent); outline-offset: 2px; }
  .card.removed { opacity: .45; filter: grayscale(.6); }

  .card .thumb {
    width: 100%; aspect-ratio: 3 / 4;
    background: #eceff3;
    display: flex; align-items: center; justify-content: center;
  }
  .card .thumb canvas,
  .card .thumb img { max-width: 100%; max-height: 100%; display: block; }
  .card .thumb .loading { font-size: 12px; color: var(--muted); }

  .card .meta { padding: 8px 10px; }
  .card .meta .pgnum { font-size: 13px; font-weight: 700; }
  .card .meta .src {
    font-size: 11px; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .card .badge {
    position: absolute; top: 8px; left: 8px;
    background: rgba(31,36,48,.85); color: #fff;
    font-size: 12px; font-weight: 700;
    min-width: 22px; height: 22px; padding: 0 6px;
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
  }
  .card .del {
    position: absolute; top: 6px; right: 6px;
    width: 24px; height: 24px; padding: 0; border-radius: 50%;
    background: rgba(255,255,255,.92); border: 1px solid var(--border);
    color: var(--danger); font-size: 15px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
  }
  .card .restore {
    position: absolute; inset: 0; margin: auto; width: 70px; height: 32px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    font-size: 12px; color: var(--accent);
  }

  .empty { text-align: center; color: var(--muted); padding: 50px 0; font-size: 14px; }

  /* 상태 토스트 */
  .status {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #1f2430; color: #fff; padding: 11px 20px; border-radius: 10px;
    font-size: 14px; box-shadow: var(--shadow); opacity: 0; pointer-events: none;
    transition: opacity .2s; max-width: 90%;
  }
  .status.show { opacity: 1; }
</style>
</head>
<body>
  <header>
    <h1>PDF 페이지 편집기</h1>
    <p>PDF를 불러와 불필요한 페이지를 삭제하고, 순서를 바꾼 뒤 새 PDF로 저장하세요.</p>
  </header>

  <div class="wrap">
    <!-- 업로드 영역 -->
    <div class="dropzone" id="dropzone">
      <div class="icon">📄⬆️</div>
      <div class="main">PDF 파일을 여기로 끌어다 놓거나 클릭해서 선택하세요</div>
      <div class="sub">한 개 이상 선택할 수 있고, 여러 번 추가하면 페이지가 이어서 붙습니다</div>
      <input type="file" id="fileInput" accept="application/pdf" multiple hidden />
    </div>

    <!-- 툴바 -->
    <div class="toolbar" id="toolbar" style="display:none">
      <span class="count" id="count"></span>
      <button id="addMore">＋ 파일 추가</button>
      <button id="resetBtn" class="ghost-danger">전체 초기화</button>
      <button id="downloadBtn" class="primary">⬇️ 새 PDF 다운로드</button>
    </div>

    <p class="hint" id="hint" style="display:none">
      💡 페이지 카드를 끌어다 놓으면 순서가 바뀌고, 오른쪽 위 ✕ 로 삭제(되돌리기 가능)할 수 있습니다.
    </p>

    <!-- 페이지 그리드 -->
    <div class="grid" id="grid"></div>
  </div>

  <div class="status" id="statusBox"></div>

<script>
  // ---- pdf.js 워커 설정 ----
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  const { PDFDocument } = PDFLib;

  // ---- 상태 ----
  let docs = [];   // { name, bytes(Uint8Array), pdfjs(렌더용 문서) }
  let pages = [];  // { id, docIndex, pageIndex, removed }
  let uid = 0;

  // ---- 요소 ----
  const dropzone = document.getElementById("dropzone");
  const fileInput = document.getElementById("fileInput");
  const grid = document.getElementById("grid");
  const toolbar = document.getElementById("toolbar");
  const hint = document.getElementById("hint");
  const countEl = document.getElementById("count");
  const statusBox = document.getElementById("statusBox");

  // ---- 토스트 ----
  let statusTimer;
  function showStatus(msg, ms = 2200) {
    statusBox.textContent = msg;
    statusBox.classList.add("show");
    clearTimeout(statusTimer);
    if (ms) statusTimer = setTimeout(() => statusBox.classList.remove("show"), ms);
  }
  function hideStatus() { statusBox.classList.remove("show"); }

  // ---- 파일 업로드 핸들링 ----
  dropzone.addEventListener("click", () => fileInput.click());
  document.getElementById("addMore").addEventListener("click", () => fileInput.click());
  fileInput.addEventListener("change", (e) => { handleFiles(e.target.files); fileInput.value = ""; });

  dropzone.addEventListener("dragover", (e) => { e.preventDefault(); dropzone.classList.add("drag"); });
  dropzone.addEventListener("dragleave", () => dropzone.classList.remove("drag"));
  dropzone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropzone.classList.remove("drag");
    handleFiles(e.dataTransfer.files);
  });

  async function handleFiles(fileList) {
    const pdfFiles = Array.from(fileList).filter(f => f.type === "application/pdf" || f.name.toLowerCase().endsWith(".pdf"));
    if (pdfFiles.length === 0) { showStatus("PDF 파일만 불러올 수 있습니다."); return; }

    showStatus("PDF 불러오는 중...", 0);
    for (const file of pdfFiles) {
      try {
        const buf = new Uint8Array(await file.arrayBuffer());
        // pdf.js 가 버퍼를 점유/분리할 수 있으므로 복사본을 넘긴다
        const pdfjsDoc = await pdfjsLib.getDocument({ data: buf.slice(0) }).promise;
        const docIndex = docs.length;
        docs.push({ name: file.name, bytes: buf, pdfjs: pdfjsDoc });
        for (let p = 1; p <= pdfjsDoc.numPages; p++) {
          pages.push({ id: ++uid, docIndex, pageIndex: p, removed: false });
        }
      } catch (err) {
        console.error(err);
        showStatus(`"${file.name}" 을(를) 읽지 못했습니다.`);
      }
    }
    hideStatus();
    render();
  }

  // ---- 그리드 렌더 ----
  function activePages() { return pages.filter(p => !p.removed); }

  function render() {
    const hasPages = pages.length > 0;
    toolbar.style.display = hasPages ? "flex" : "none";
    hint.style.display = hasPages ? "flex" : "none";

    const active = activePages().length;
    countEl.textContent = `전체 ${pages.length}페이지 중 ${active}페이지 선택됨`;
    document.getElementById("downloadBtn").disabled = active === 0;

    grid.innerHTML = "";
    if (!hasPages) return;

    let outNum = 0;
    pages.forEach((page) => {
      if (!page.removed) outNum++;
      const card = buildCard(page, page.removed ? null : outNum);
      grid.appendChild(card);
    });
  }

  function buildCard(page, outNum) {
    const doc = docs[page.docIndex];
    const card = document.createElement("div");
    card.className = "card" + (page.removed ? " removed" : "");
    card.dataset.id = page.id;
    card.draggable = !page.removed;

    // 순서 배지
    if (!page.removed) {
      const badge = document.createElement("div");
      badge.className = "badge";
      badge.textContent = outNum;
      card.appendChild(badge);
    }

    // 썸네일
    const thumb = document.createElement("div");
    thumb.className = "thumb";
    const loading = document.createElement("div");
    loading.className = "loading";
    loading.textContent = "렌더링...";
    thumb.appendChild(loading);
    card.appendChild(thumb);
    renderThumb(doc.pdfjs, page.docIndex, page.pageIndex, thumb, loading);

    // 메타 정보
    const meta = document.createElement("div");
    meta.className = "meta";
    meta.innerHTML =
      `<div class="pgnum">원본 p.${page.pageIndex}</div>` +
      `<div class="src" title="${escapeHtml(doc.name)}">${escapeHtml(doc.name)}</div>`;
    card.appendChild(meta);

    // 삭제 / 복원 버튼
    if (!page.removed) {
      const del = document.createElement("button");
      del.className = "del";
      del.textContent = "✕";
      del.title = "이 페이지 삭제";
      del.addEventListener("click", (e) => { e.stopPropagation(); page.removed = true; render(); showStatus("페이지를 삭제했습니다."); });
      card.appendChild(del);
    } else {
      const restore = document.createElement("button");
      restore.className = "restore";
      restore.textContent = "되돌리기";
      restore.addEventListener("click", (e) => { e.stopPropagation(); page.removed = false; render(); });
      card.appendChild(restore);
    }

    // 드래그 정렬
    attachDnD(card, page);
    return card;
  }

  // 썸네일 캐시 (한 번 렌더한 페이지는 이미지로 재사용)
  const thumbCache = new Map();
  async function renderThumb(pdfjsDoc, docIndex, pageIndex, container, loadingEl) {
    const key = `${docIndex}-${pageIndex}`;

    // 캐시 적중: 저장해 둔 이미지 데이터를 <img>로 표시
    if (thumbCache.has(key)) {
      loadingEl.remove();
      const img = document.createElement("img");
      img.src = thumbCache.get(key);
      container.appendChild(img);
      return;
    }

    try {
      const pdfPage = await pdfjsDoc.getPage(pageIndex);
      const viewport = pdfPage.getViewport({ scale: 1 });
      const scale = 300 / viewport.width; // 적당한 해상도
      const v = pdfPage.getViewport({ scale });
      const canvas = document.createElement("canvas");
      canvas.width = Math.floor(v.width);
      canvas.height = Math.floor(v.height);
      await pdfPage.render({ canvasContext: canvas.getContext("2d"), viewport: v }).promise;

      // 캔버스를 이미지 데이터로 변환해 캐시에 저장 (cloneNode 문제 회피)
      const dataUrl = canvas.toDataURL("image/png");
      thumbCache.set(key, dataUrl);

      loadingEl.remove();
      const img = document.createElement("img");
      img.src = dataUrl;
      container.appendChild(img);
    } catch (e) {
      loadingEl.textContent = "미리보기 실패";
    }
  }

  // ---- 드래그 앤 드롭 정렬 ----
  let dragId = null;
  function attachDnD(card, page) {
    card.addEventListener("dragstart", (e) => {
      if (page.removed) { e.preventDefault(); return; }
      dragId = page.id;
      card.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
    });
    card.addEventListener("dragend", () => {
      dragId = null;
      card.classList.remove("dragging");
      document.querySelectorAll(".card.over").forEach(c => c.classList.remove("over"));
    });
    card.addEventListener("dragover", (e) => {
      e.preventDefault();
      if (dragId === null || page.removed) return;
      card.classList.add("over");
    });
    card.addEventListener("dragleave", () => card.classList.remove("over"));
    card.addEventListener("drop", (e) => {
      e.preventDefault();
      card.classList.remove("over");
      if (dragId === null) return;
      const from = pages.findIndex(p => p.id === dragId);
      const to = pages.findIndex(p => p.id === page.id);
      if (from === -1 || to === -1 || from === to) return;
      const [moved] = pages.splice(from, 1);
      pages.splice(to, 0, moved);
      render();
    });
  }

  // ---- 전체 초기화 ----
  document.getElementById("resetBtn").addEventListener("click", () => {
    if (pages.length && !confirm("불러온 PDF와 편집 내용을 모두 지웁니다. 계속할까요?")) return;
    docs = []; pages = []; thumbCache.clear();
    render();
  });

  // ---- 새 PDF 생성 & 다운로드 ----
  document.getElementById("downloadBtn").addEventListener("click", async () => {
    const ordered = activePages();
    if (ordered.length === 0) { showStatus("저장할 페이지가 없습니다."); return; }

    showStatus("새 PDF 만드는 중...", 0);
    try {
      const out = await PDFDocument.create();
      // 원본 문서를 docIndex 별로 한 번씩만 로드
      const loaded = {};
      for (const p of ordered) {
        if (!loaded[p.docIndex]) {
          loaded[p.docIndex] = await PDFDocument.load(docs[p.docIndex].bytes, { ignoreEncryption: true });
        }
      }
      // 선택된 순서대로 페이지 복사
      for (const p of ordered) {
        const src = loaded[p.docIndex];
        const [copied] = await out.copyPages(src, [p.pageIndex - 1]);
        out.addPage(copied);
      }
      const bytes = await out.save();
      const blob = new Blob([bytes], { type: "application/pdf" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "edited.pdf";
      a.click();
      URL.revokeObjectURL(url);
      showStatus(`완료! ${ordered.length}페이지 PDF를 저장했습니다.`);
    } catch (err) {
      console.error(err);
      showStatus("PDF 생성 중 오류가 발생했습니다.");
    }
  });

  // ---- 유틸 ----
  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
  }
</script>
</body>
</html>
